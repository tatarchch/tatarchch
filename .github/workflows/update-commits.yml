name: Update Contributions Count

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update contributions count in README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: tatarchch
        run: |
          python <<'PY'
          import json
          import os
          import re
          import urllib.request
          from datetime import datetime, timezone

          username = os.environ["GITHUB_USERNAME"]
          token = os.environ["GITHUB_TOKEN"]

          now = datetime.now(timezone.utc)
          year = now.year
          from_date = f"{year}-01-01T00:00:00Z"
          to_date = now.strftime("%Y-%m-%dT%H:%M:%SZ")

          query = """
          query($login: String!, $from: DateTime!, $to: DateTime!) {
            user(login: $login) {
              contributionsCollection(from: $from, to: $to) {
                contributionCalendar {
                  totalContributions
                }
              }
            }
          }
          """

          payload = json.dumps({
              "query": query,
              "variables": {
                  "login": username,
                  "from": from_date,
                  "to": to_date,
              },
          }).encode("utf-8")

          request = urllib.request.Request(
              "https://api.github.com/graphql",
              data=payload,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          with urllib.request.urlopen(request) as response:
              result = json.loads(response.read().decode("utf-8"))

          if "errors" in result:
              raise RuntimeError(result["errors"])

          contributions = result["data"]["user"]["contributionsCollection"]["contributionCalendar"]["totalContributions"]

          readme_path = "README.md"

          with open(readme_path, "r", encoding="utf-8") as file:
              readme = file.read()

          new_block = f"<!-- COMMITS:START -->\n**Contributions in {year}:** {contributions}\n<!-- COMMITS:END -->"

          updated = re.sub(
              r"<!-- COMMITS:START -->.*?<!-- COMMITS:END -->",
              new_block,
              readme,
              flags=re.DOTALL,
          )

          if updated != readme:
              with open(readme_path, "w", encoding="utf-8") as file:
                  file.write(updated)

              print(f"Updated README: Contributions in {year}: {contributions}")
          else:
              print("README already up to date.")
          PY

      - name: Commit README changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update contributions count in README
          file_pattern: README.md
